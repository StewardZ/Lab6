name: build and test

on:
  push:
  pull_request:
    branches: [ main ]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - '.github/workflows/**'

jobs:
  build-and-test:
    name: build-and-test-${{ matrix.os }}-${{ matrix.dotnet }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, windows-2022]
        dotnet: ['9.0.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore ./Lab5/Lab5.sln

      - name: Build
        run: dotnet build ./Lab5/Lab5.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ./Lab5/Lab5.sln --configuration Release --no-build --verbosity normal
